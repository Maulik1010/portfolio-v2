spring.application.name=portfolio

server.port=8080

# MySQL connection — update these to match your local MySQL setup.
# Create the database first: CREATE DATABASE portfolio_db;
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:system}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# The address contact-form messages get sent to.
portfolio.contact.notify-email=${NOTIFY_EMAIL:maulik1276@email.com}
