spring.application.name=portfolio

server.port=8080

# MySQL connection — update these to match your local MySQL setup.
# Create the database first: CREATE DATABASE portfolio_db;
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Creates/updates tables automatically based on your @Entity classes.
# Switch to "validate" once your schema is stable in a real deployment.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
